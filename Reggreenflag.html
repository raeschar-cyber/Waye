<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Cancelled Checker</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
.knop-container { 
    display: flex; 
    flex-direction: column; 
    gap: 15px; 
}

body { 
    margin: 0; 
    height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    transition: background-color 0.5s ease; 
    font-family: 'Segoe UI', sans-serif; 
    background-color: white;
}
.card { 
    background: rgba(255,255,255,0.95); 
    padding: 40px; 
    border-radius: 25px; 
    box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
    text-align: center; 
    width: 380px; 
}
button { 
    padding: 15px; 
    border: none; 
    border-radius: 12px; 
    cursor: pointer; 
    font-weight: bold; 
    font-size: 1.1rem;
    background: #333; 
    color: white;
}
button:hover { transform: scale(1.05); background: black; }

input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    width: 80%;
    margin-bottom: 15px;
}

.resultaat-tekst {
    font-size: 2.5rem;
    font-weight: 900;
}
.cancelled { color: red; }
.not-cancelled { color: green; }
</style>
</head>

<body>

<div id="startScreen" class="card">
    <h2>Enter your name</h2>
    <input id="naamInput" placeholder="Your name">
    <br>
    <button onclick="startQuiz()">Start</button>
</div>

<div id="quizCard" class="card" style="display:none;">
    <h2 id="vraagDisplay"></h2>
    <div id="knoppen" class="knop-container"></div>
</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyDd03–DAfqcHPhFvEEtNgABMqi_KRa5A",
  authDomain: "redgreenflag-5f9a5.firebaseapp.com",
  projectId: "redgreenflag-5f9a5",
  storageBucket: "redgreenflag-5f9a5.firebasestorage.app",
  messagingSenderId: "729047340960",
  appId: "1:729047340960:web:4792e4124d26eeeef5b6c5",
  measurementId: "G-RYWXBTESPB"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= QUIZ DATA =================
    const mijnVragen = [
        { vraag: "Pineapple on pizza", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Socks in sandals", opties: [{tekst: "Yes", p: -1}, {tekst: "No", p: 1}] },
        { vraag: "Self-sabotage", opties: [{tekst: "Yes", p: -1}, {tekst: "No", p: 1}] },
        { vraag: "Keeping plants alive", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Tattoo laser", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Snooze alarm clock", opties: [{tekst: "Yes", p: -1}, {tekst: "No", p: 1}] },
        { vraag: "Cats", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Dogs", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Not cleaning the phone", opties: [{tekst: "Yes", p: -1}, {tekst: "No", p: 1}] },
        { vraag: "Painting nails", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Prank call scammers", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Harry styles", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Spain", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "One knot in shoelaces", opties: [{tekst: "Yes", p: -1}, {tekst: "No", p: 1}] },
        { vraag: "Hummus", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Slipping", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Cap", opties: [{tekst: "Yes", p: -1}, {tekst: "No", p: 1}] },
        { vraag: "Smoking", opties: [{tekst: "Yes", p: -1}, {tekst: "No", p: 1}] },
        { vraag: "Bee", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Christmas", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
        { vraag: "Horoscope", opties: [{tekst: "Yes", p: 1}, {tekst: "No", p: -1}] },
    ];

let score = 0;
let index = 0;
let naam = "";

// ================= START =================
function startQuiz(){
    naam = document.getElementById("naamInput").value.trim();
    if(!naam) return alert("Enter name!");

    document.getElementById("startScreen").style.display="none";
    document.getElementById("quizCard").style.display="block";

    toonVraag();
}

// ================= VRAGEN =================
function toonVraag(){

    if(index >= mijnVragen.length){
        eind();
        return;
    }

    const q = mijnVragen[index];
    document.getElementById("vraagDisplay").innerText = q.vraag;

    const div = document.getElementById("knoppen");
    div.innerHTML = "";

    q.opties.forEach(o=>{
        const b = document.createElement("button");
        b.innerText = o.tekst;
        b.onclick = ()=>{
            score += o.p;
            index++;
            kleur();
            toonVraag();
        };
        div.appendChild(b);
    });
}

// ================= KLEUR =================
function kleur(){
    let r=255,g=255,b=255;
    let i = Math.min(Math.abs(score)*40,255);

    if(score>0){ r=255-i; b=255-i; }
    if(score<0){ g=255-i; b=255-i; }

    document.body.style.background = `rgb(${r},${g},${b})`;
}

// ================= EINDE + FIRESTORE =================
async function eind(){

    let status = "NEUTRAL";
    let cls = "";

    if(score > 0){ status="NOT CANCELLED"; cls="not-cancelled"; }
    if(score < 0){ status="CANCELLED"; cls="cancelled"; }

    // SAVE TO FIRESTORE
    await db.collection("results").add({
        naam: naam,
        status: status,
        score: score,
        time: Date.now()
    });

    // LIVE LEADERBOARD
    db.collection("results")
      .orderBy("time","desc")
      .onSnapshot(snapshot=>{

        let html = `<div class="resultaat-tekst ${cls}">${status}</div><h3>Leaderboard</h3>`;

        snapshot.forEach(doc=>{
            let d = doc.data();
            html += `<p>${d.naam}: ${d.status}</p>`;
        });

        document.getElementById("vraagDisplay").innerHTML = html;
        document.getElementById("knoppen").innerHTML =
            `<button onclick="location.reload()">Try again</button>`;
      });
}

</script>
</body>
</html>
